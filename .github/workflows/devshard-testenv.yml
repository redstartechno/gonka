name: devshard testenv

on:
  pull_request:
    paths:
      - 'devshard/testenv/**'
      - 'devshard/chainoracle/**'
      - 'devshard/runtimeconfig/**'
      - 'devshard/runtimeparams/**'
      - 'common/runtimeconfig/**'
      - 'common/chain/**'
      - 'decentralized-api/nodemanager/**'
      - '.github/workflows/devshard-testenv.yml'
  workflow_dispatch:
    inputs:
      integration:
        description: 'Run Docker stack citest (S1–S6 + A1–A4)'
        required: false
        type: boolean
        default: false

jobs:
  unit:
    runs-on: ubuntu-latest
    name: testenv unit
    defaults:
      run:
        working-directory: ./devshard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache-dependency-path: |
            devshard/go.sum
            common/go.sum
            decentralized-api/go.sum

      - name: Run ci-testenv-unit
        run: make ci-testenv-unit

  integration:
    if: github.event_name == 'workflow_dispatch' && inputs.integration
    runs-on: ubuntu-latest
    name: testenv integration (Docker)
    defaults:
      run:
        working-directory: ./devshard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache-dependency-path: devshard/go.sum

      - name: Run ci-testenv-integration
        run: make ci-testenv-integration
