name: Build and Release to race-releases

on:
  push:
    tags:
      - 'release/v[0-9]*.[0-9]*.[0-9]*'
      - 'release/v[0-9]*.[0-9]*.[0-9]*-*'
jobs:
  build_and_release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./inference-chain
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.6'

      - name: Prepare Release Variables
        id: vars
        uses: ignite/cli/actions/release/vars@main

      - name: Issue Release Assets
        if: ${{ steps.vars.outputs.should_release == 'true' }}
        env:
          DO_NOT_TRACK: 1
        run: |
          set -euo pipefail
          curl -sL https://get.ignite.com/cli@v28.11.2! | bash
          ignite chain build --release --release.prefix "${{ steps.vars.outputs.tarball_prefix }}" -t linux:amd64 -t darwin:amd64 -t darwin:arm64 -y

      - name: Prepare inferenced release asset
        if: ${{ steps.vars.outputs.should_release == 'true' }}
        run: |
          set -euo pipefail
          rm -rf ../public-html/v2/inferenced/* ../public-html/v2/checksums.txt ../public-html/v2/urls.txt
          mkdir -p ../public-html/v2/inferenced
          SRC="$(ls -1 ./release/*linux*amd64*.zip 2>/dev/null | awk 'NR==1{print; exit}')"
          test -n "$SRC"
          cp "$SRC" ../public-html/v2/inferenced/inferenced-linux-amd64.zip
          echo "inferenced-linux-amd64.zip $(sha256sum ../public-html/v2/inferenced/inferenced-linux-amd64.zip | awk '{print $1}')" >> ../public-html/v2/checksums.txt

      - name: Build decentralized-api for upgrade
        run: make -C ../decentralized-api build-for-upgrade

      - name: Generate GitHub App Installation Token for release
        id: get_release_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: product-science
          repositories: race-releases

      - name: Create Release in race-releases with softprops/action-gh-release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ steps.get_release_token.outputs.token }}
          repository: product-science/race-releases
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release created from main source tag ${{ github.ref_name }}.
            Build artifacts from the release workflow.
          draft: false
          prerelease: false
          files: |
            ./public-html/v2/inferenced/*.zip
            ./public-html/v2/dapi/*.zip

      - name: Create tag artifact
        run: echo "${{ github.ref_name }}" > release_tag.txt

      - name: Upload tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tag-artifact
          path: release_tag.txt