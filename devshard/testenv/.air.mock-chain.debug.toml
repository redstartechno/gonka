# air + dlv config for mock-chain. Debug port: 2345.
root = "/workspace/devshard"
tmp_dir = "/tmp/air/mock-chain"

[build]
  cmd = "go build -gcflags 'all=-N -l' -o /tmp/air/mock-chain/mockchain ./testenv/cmd/mockchain"
  full_bin = "dlv exec /tmp/air/mock-chain/mockchain --listen=:2345 --headless=true --api-version=2 --accept-multiclient --continue --"
  include_ext = ["go", "yaml", "toml", "proto"]
  exclude_dir = [
    ".git",
    "docs",
    "testenv/docs",
    "testenv/db",
  ]
  delay = 500
  kill_delay = "1s"
  stop_on_error = true

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true
