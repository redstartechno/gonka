# air live-reload config for mock-chain (Phase 4).
root = "/workspace/devshard"
tmp_dir = "/tmp/air/mock-chain"

[build]
  cmd = "go build -o /tmp/air/mock-chain/mockchain ./testenv/cmd/mockchain"
  bin = "/tmp/air/mock-chain/mockchain"
  include_ext = ["go", "yaml", "toml", "proto"]
  exclude_dir = [
    ".git",
    "docs",
    "testenv/docs",
    "testenv/db",
  ]
  delay = 500
  kill_delay = "1s"
  stop_on_error = true

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true
