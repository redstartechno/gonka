# air + dlv config for mock-openai. Debug port: 2347.
root = "/workspace/devshard"
tmp_dir = "/tmp/air/mock-openai"

[build]
  cmd = "go build -gcflags 'all=-N -l' -o /tmp/air/mock-openai/mockopenai ./testenv/cmd/mockopenai"
  full_bin = "dlv exec /tmp/air/mock-openai/mockopenai --listen=:2347 --headless=true --api-version=2 --accept-multiclient --continue --"
  include_ext = ["go", "yaml", "toml", "proto"]
  exclude_dir = [".git", "docs", "testenv/docs", "testenv/db"]
  delay = 500
  kill_delay = "1s"
  stop_on_error = true

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true
