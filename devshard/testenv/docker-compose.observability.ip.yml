# Fixed IPs on the testenv bridge (high slot .60+) so observability containers
# do not collide with gencompose static assignments (.2–.11).
# Adjust base_ip if you change network.base_ip in config.yaml (default 172.30.0).

services:
  jaeger:
    networks:
      testenv:
        ipv4_address: 172.30.0.60
  prometheus:
    networks:
      testenv:
        ipv4_address: 172.30.0.61
  loki:
    networks:
      testenv:
        ipv4_address: 172.30.0.62
  promtail:
    networks:
      testenv:
        ipv4_address: 172.30.0.63
  grafana:
    networks:
      testenv:
        ipv4_address: 172.30.0.64
