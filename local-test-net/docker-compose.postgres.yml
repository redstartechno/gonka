# Opt-in overlay: brings up a single Postgres container on the shared
# chain-public network so devshard storage uses Postgres instead of the
# SQLite fallback.
#
# Activate by setting LOCAL_TESTNET_POSTGRES=1 before launch (the launch
# scripts include this overlay only for the genesis project; join nodes
# inherit access via the shared network and rely on PGHOST env vars
# already propagated through docker-compose-base.yml).
#
# Mirrors the production setup in deploy/join/docker-compose.postgres.yml:
# same image, same default db/user. Host port is 15432 by default to avoid
# collisions with developer-local Postgres installs; override via
# TESTERMINT_PG_PORT.
services:
  postgres:
    container_name: testermint-postgres
    image: postgres:18.1-bookworm
    environment:
      POSTGRES_DB: payloads
      POSTGRES_USER: payloads
      POSTGRES_PASSWORD: test
    ports:
      - "${TESTERMINT_PG_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payloads -d payloads"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - testermint-postgres-data:/var/lib/postgresql
    networks:
      - chain-public

  api:
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  testermint-postgres-data:
